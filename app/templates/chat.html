<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .chat-container {
            width: 90%; max-width: 900px; height: 90vh; background: white;
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px; text-align: center; border-radius: 20px 20px 0 0;
        }
        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto; background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px; display: flex; animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-content {
            max-width: 70%; padding: 12px 18px; border-radius: 15px;
            word-wrap: break-word; line-height: 1.5; white-space: pre-wrap;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .message-content {
            background: white; color: #333; border: 1px solid #e0e0e0;
        }
        .sql-result {
            background: #f0f4f8; padding: 10px; border-radius: 6px;
            margin-top: 10px; font-family: 'Courier New', monospace;
            font-size: 12px; direction: ltr; text-align: left;
            border-left: 3px solid #667eea; overflow-x: auto;
        }
        .result-table {
            width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px;
        }
        .result-table th, .result-table td {
            border: 1px solid #ddd; padding: 8px; text-align: right;
        }
        .result-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .result-table tr:nth-child(even) { background: #f9f9f9; }
        .chat-input-area {
            padding: 15px; background: white; border-top: 2px solid #e0e0e0;
            display: flex; gap: 10px; border-radius: 0 0 20px 20px;
        }
        #userInput {
            flex: 1; padding: 12px 18px; border: 2px solid #e0e0e0;
            border-radius: 20px; font-size: 15px; outline: none;
        }
        #userInput:focus { border-color: #667eea; }
        #sendButton {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 20px;
            font-size: 15px; cursor: pointer; font-weight: bold;
        }
        #sendButton:hover { transform: translateY(-2px); }
        #sendButton:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>شات بوت ذكي</h1>
            <p>Powered by Phi-2 + SQLCoder-7B</p>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
            <button id="sendButton">إرسال</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');

        function addMessage(text, isUser, sqlResult = null, resultData = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            if (sqlResult) {
                const sqlDiv = document.createElement('div');
                sqlDiv.className = 'sql-result';
                sqlDiv.innerHTML = `<strong>SQL Query:</strong><br>${sqlResult}`;
                contentDiv.appendChild(sqlDiv);
            }

            if (resultData && resultData.length > 0) {
                const keys = Object.keys(resultData[0]);
                let html = '<table class="result-table"><thead><tr>';
                keys.forEach(key => { html += `<th>${key}</th>`; });
                html += '</tr></thead><tbody>';
                resultData.slice(0, 50).forEach(row => {
                    html += '<tr>';
                    keys.forEach(key => { html += `<td>${row[key] ?? '-'}</td>`; });
                    html += '</tr>';
                });
                html += '</tbody></table>';
                if (resultData.length > 50) {
                    html += `<p style="margin-top:10px; font-size:12px; color:#666;">عرض 50 من ${resultData.length} نتيجة</p>`;
                }
                contentDiv.innerHTML += html;
            }

            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleSend() {
            const question = userInput.value.trim();
            if (!question || sendButton.disabled) return;

            addMessage(question, true);
            userInput.value = '';
            sendButton.disabled = true;
            sendButton.textContent = 'جاري المعالجة...';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                const data = await response.json();
                addMessage(data.answer, false, data.sql, data.results);
            } catch (error) {
                addMessage('خطأ في الاتصال بالسيرفر', false);
                console.error(error);
            }

            sendButton.disabled = false;
            sendButton.textContent = 'إرسال';
        }

        sendButton.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // رسالة ترحيبية
        addMessage(`مرحباً! أنا بوت ذكي للاستعلام عن قاعدة بيانات الطلاب.

جرب هذه الأسئلة:
- مرحباً / كيف حالك؟
- كم عدد الطلاب؟
- من الطلاب اللي عمرهم أكبر من 25؟
- كم عدد الإناث من الشمال؟
- اعرض أسماء الطلاب`, false);
    </script>
</body>
</html>
